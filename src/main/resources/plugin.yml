name: WorldPrune
version: ${version}
main: dev.minecraft.prune.WorldPrunePlugin
api-version: "1.20"
authors: ["ops"]
softdepend: [GriefPrevention, CoreProtect, Towny, Residence, WorldGuard, BlueMap, dynmap]

commands:
  prune:
    description: Region prune planning and operations
    usage: /prune <scan|apply|confirm|undo|quarantine|drop|plans|plan|status>
    permission: prune.admin

permissions:
  prune.admin:
    description: Read-only prune access (plan, status)
    default: op
    children:
      prune.admin.apply: true
      prune.admin.purge: true
  prune.admin.apply:
    description: Apply and restore quarantine operations
    default: op
  prune.admin.purge:
    description: Permanently delete quarantine directories
    default: op
