services:
  paper-test-server:
    image: itzg/minecraft-server:latest
    container_name: paper-test-server
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.11"
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "true"
      RCON_PASSWORD: minecraft
      RCON_PORT: "25575"
      # itzg downloads these from Modrinth on startup; pinned to exact version IDs
      # so the test environment is reproducible.  Renovate keeps these current.
      MODRINTH_PROJECTS: "coreprotect:HD2IvrxS,bluemap:rUyuQba7,dynmap:ImNNT17B"
    ports:
      - "25565:25565"
    stdin_open: true
    tty: true
