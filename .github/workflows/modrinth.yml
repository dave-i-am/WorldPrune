name: Publish to Modrinth

on:
  release:
    types: [published]

jobs:
  modrinth:
    name: Upload to Modrinth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build plugin JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Derive game versions from CI matrix
        id: versions
        run: |
          versions=$(grep '^\s*- "[0-9]' .github/workflows/ci.yml \
            | sed 's/.*"\(.*\)"/\1/' \
            | sed 's/-R[0-9.]*-SNAPSHOT//' \
            | tr '\n' ',' | sed 's/,$//')
          echo "list=$versions" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: worldprune
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/world-prune-plugin-*.jar
          name: WorldPrune ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}
          version-type: release
          game-versions: ${{ steps.versions.outputs.list }}
          loaders: spigot, paper, bukkit

      - name: Update Modrinth project description
        run: |
          body=$(jq -Rs '.' modrinth-description.md)
          curl -sf -X PATCH "https://api.modrinth.com/v2/project/worldprune" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $body}"
