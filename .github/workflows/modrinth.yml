name: Publish to Modrinth

on:
  release:
    types: [published]

jobs:
  modrinth:
    name: Upload to Modrinth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build plugin JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/world-prune-plugin-*.jar
          name: WorldPrune ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}
          version-type: release
          # Configure these in Settings → Variables → Actions
          # e.g. MODRINTH_GAME_VERSIONS = "1.20.1,1.21.1,1.21.4"
          # e.g. MODRINTH_LOADERS = "spigot,paper,purpur,folia"
          game-versions: ${{ vars.MODRINTH_GAME_VERSIONS }}
          loaders: ${{ vars.MODRINTH_LOADERS }}
