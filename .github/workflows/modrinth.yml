name: Publish to Modrinth

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.2.0)"
        required: true

jobs:
  modrinth:
    name: Upload to Modrinth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build plugin JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Get release changelog
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          {
            echo "body<<EOF"
            gh release view "$tag" --json body --jq .body
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Derive game versions from CI matrix
        id: versions
        run: |
          {
            echo "list<<EOF"
            grep '^\s*- "[0-9]' .github/workflows/ci.yml \
              | sed 's/.*"\(.*\)"/\1/' \
              | sed 's/-R[0-9.]*-SNAPSHOT//'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: worldprune
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-game-versions: ${{ steps.versions.outputs.list }}
          modrinth-game-version-filter: none
          files: build/libs/world-prune-plugin-*.jar
          name: WorldPrune ${{ github.event.release.tag_name || inputs.tag }}
          version: ${{ github.event.release.tag_name || inputs.tag }}
          changelog: ${{ steps.release.outputs.body }}
          version-type: release
          loaders: spigot, paper, bukkit

      - name: Update Modrinth project description
        run: |
          curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/main/modrinth-description.md" \
            -o modrinth-description.md
          body=$(jq -Rs '.' modrinth-description.md)
          curl -sf -X PATCH "https://api.modrinth.com/v2/project/worldprune" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $body}"
