name: Release

on:
  push:
    branches: [main, develop]

# semantic-release needs to push commits + create releases
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    # Skip the automated version-bump commit that semantic-release pushes back
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install release dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          # Use RELEASE_PAT if set (needed when branch protection blocks GITHUB_TOKEN
          # from pushing back to main). Create a fine-grained PAT with Contents:write
          # and store it as a repository secret named RELEASE_PAT.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: npx semantic-release
