name: Release

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

# semantic-release needs to push commits + create releases
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    # Skip only when semantic-release itself pushes the version-bump commit back.
    # Checking the actor (not the commit message) is correct for rebase-merge workflows:
    # the [skip ci] release commit from develop becomes HEAD of main after a rebase merge,
    # so a message-based check would wrongly suppress the stable release.
    if: "github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install release dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          # Use RELEASE_PAT if set (needed when branch protection blocks GITHUB_TOKEN
          # from pushing back to main). Create a fine-grained PAT with Contents:write
          # and store it as a repository secret named RELEASE_PAT.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Sync release commit back to develop
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin
          git checkout develop
          git merge --ff-only origin/main || git merge -X theirs origin/main
          git push origin develop
