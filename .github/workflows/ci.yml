name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spigot-version:
          - "1.20-R0.1-SNAPSHOT"
          - "1.20.1-R0.1-SNAPSHOT"
          - "1.20.2-R0.1-SNAPSHOT"
          - "1.20.3-R0.1-SNAPSHOT"
          - "1.20.4-R0.1-SNAPSHOT"
          - "1.20.5-R0.1-SNAPSHOT"
          - "1.20.6-R0.1-SNAPSHOT"
          - "1.21-R0.1-SNAPSHOT"
          - "1.21.1-R0.1-SNAPSHOT"
          - "1.21.2-R0.1-SNAPSHOT"
          - "1.21.3-R0.1-SNAPSHOT"
          - "1.21.4-R0.1-SNAPSHOT"
          - "1.21.5-R0.1-SNAPSHOT"
          - "1.21.6-R0.1-SNAPSHOT"
          - "1.21.7-R0.1-SNAPSHOT"
          - "1.21.8-R0.1-SNAPSHOT"
          - "1.21.9-R0.1-SNAPSHOT"
          - "1.21.10-R0.1-SNAPSHOT"
          - "1.21.11-R0.2-SNAPSHOT"
          - "26.1-R0.1-SNAPSHOT"
          - "26.1.1-R0.1-SNAPSHOT"

    name: Compile & test (Spigot ${{ matrix.spigot-version }})

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build against Spigot ${{ matrix.spigot-version }}
        run: ./gradlew build --no-daemon -PspigotVersion=${{ matrix.spigot-version }}

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build plugin JAR (skip unit tests — already ran in build job)
        run: ./gradlew shadowJar --no-daemon

      - name: Run integration tests
        run: ./gradlew integration --no-daemon

      - name: Server logs (on failure)
        if: failure()
        run: docker logs paper-test-server 2>&1 | tail -100

  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install commitlint
        run: npm ci

      - name: Validate PR commits
        run: >
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to   ${{ github.event.pull_request.head.sha }}
          --verbose
